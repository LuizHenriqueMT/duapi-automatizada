name: Parallel Cypress Tests
on: workflow_dispatch
jobs:
  initial_tests:
    name: Initial Cypress run
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        container: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Configure Allure
        run: npm install -g allure-commandline --save-dev

      - name: Write the cypress.env.json file
        run: |
          echo '${{ secrets.CYPRESS_ENV_CI }}' > cypress.env.json

      - name: Run initial Cypress tests        
        uses: cypress-io/github-action@v6
        with:
          record: true
          parallel: true
          group: "Initial Tests"
          ci-build-id: '${{ github.sha }}-${{ github.workflow }}-${{ github.event_name }}'
          # spec: "cypress/e2e/!(e2e.cy.js|funcionario.cy.js|produto.cy.js|entregaProduto.cy.js|loginTentativa.cy.js|novoWorkspace.cy.js)"
          # spec: "cypress/e2e/!(loginTentativa.cy.js|novoWorkspace.cy.js)"
          spec: "cypress/e2e/login.cy.js"
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check Allure results directory
        run: |
            if [ ! -d "allure-results" ]; then
              echo "Allure results directory does not exist."
              exit 1
            fi
            if [ -z "$(ls -A allure-results)" ]; then
              echo "Allure results directory is empty."
              exit 1
            fi

      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report --lang br
  
      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.container }}
          path: allure-report 

  deploy:
    needs: initial_tests
    runs-on: ubuntu-22.04
    if: success() || failure()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: npm install

      - name: Configure Allure
        run: npm install -g allure-commandline --save-dev

      - name: Download Allure Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report-1 
          path: allure-report-1

      - name: Download Allure Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report-2
          path: allure-report-2

      # - name: Download Allure Report Artifact
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: allure-report-3
      #     path: allure-report-3

      # - name: Download Allure Report Artifact
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: allure-report-4
      #     path: allure-report-4

      - name: Merge Allure Results
        run: |
          mkdir -p merged-allure-results
          cp -r allure-report-1/* merged-allure-results/
          cp -r allure-report-2/* merged-allure-results/

      # - name: Merge Allure Results
      #   run: |
      #     mkdir -p merged-allure-results
      #     cp -r allure-report-1/* merged-allure-results/
      #     cp -r allure-report-2/* merged-allure-results/
      #     cp -r allure-report-3/* merged-allure-results/
      #     cp -r allure-report-4/* merged-allure-results/
  
      - name: Generate Final Allure Report
        run: |
          allure generate merged-allure-results --clean -o allure-reports --lang br

      - name: Upload Allure Merged
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-merged
          path: allure-reports

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./merged-allure-results

      - name: Send Email
        if: always()
        run: |
          node -e "
          const nodemailer = require('nodemailer');
          const fs = require('fs');
          const path = require('path');
          
          async function sendEmail() {
            let transporter = nodemailer.createTransport({
              service: 'SendGrid',
              auth: {
                user: 'apikey',
                pass: process.env.SENDGRID_API_KEY
              }
            });

            let info = await transporter.sendMail({
              from: process.env.EMAIL_USER,
              to: process.env.EMAIL_TO,
              subject: 'Relatório de Testes Automatizado',
              html: 'O relatório dos testes automatizados está disponível. Acesse: <a href="https://luizhenriquemt.github.io/duapi-automatizada/#">Relatório</a>'
            });
          }

          sendEmail().catch(console.error);
          "

    env:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}      
    
